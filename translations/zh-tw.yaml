helpBtn:
  title: 前往說明文件
helpPage:
  header: 使用說明
  banner: 公告
  releaseText: 釋出時間：
  environment:
    header: 什麼是環境？
    content: |
      <p>{appName} 可將資源分組到不同環境。每個環境都有獨立的基礎架構資源與服務，並可由一或多位使用者、團隊或組織管理。</p>
      <p>例如，您可以分別建立「開發」、「測試」與「正式」環境，確保各環境彼此隔離；開放所有成員存取「開發」環境，同時僅允許特定團隊存取「正式」環境。</p>
    manageLink: 管理環境
  host:
    header: 什麼是主機？
    content: >
      新增第一個服務或啟動容器前，請先新增至少一台執行相容 Docker 版本的 Linux 主機。該主機必須能透過 HTTP 連線至 {appName} 伺服器。{appName} 支援公有雲、私有雲與裸機環境中的虛擬或實體 Linux 主機。
    contentLink: 了解更多
    addHostLink: 新增主機
  stacks:
    header: 什麼是應用堆疊與服務？
    content:
      paragraph1: >
        服務是由相同 Docker 映像建立的一組容器。{appName} 延伸 Docker 的連結功能，透過內建的分散式 DNS 提供服務探索。您可以個別新增服務，也能從應用程式商店部署。
      paragraph2: '服務也可使用 {appName} 內建功能，例如負載平衡、健康狀態監控、升級與高可用。'
      link: 了解更多
