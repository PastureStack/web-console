authPage:
  shibboleth:
    header:
      title: Shibboleth авторизація
    enabled:
      header: '{providerName} увімкнено'
      required: |
        {appName} налаштований для забезпечення доступу: {orgs, plural,
        =0 {немає жодної організації}
        =1 {для # організації}
        other {для # організацій}
        }, {users, plural,
        =0 {немає користувачів}
        =1 {і для # користувача}
        other {і для # користувачів}
        }.
      restricted: |
        {appName} налаштований для забезпечення доступу користувачам навколишнього середовища: {orgs, plural,
        =0 {немає жодної організації}
        =1 {для # організації}
        other {для # організацій}
        }, {users, plural,
        =0 {немає користувачів}
        =1 {і для # користувача}
        other {і для # користувачів}
        }.
      unrestricted: '{appName} налаштована для надання доступу для будь-якого {providerName} користувача.'
      authenticated:
        header:
          text: Авторизація
          helpText: Щоб переналаштувати Shibboleth інтеграцію - відключіть контроль доступу трохи нижче і налаштуйте його знову.
      disableAccess:
        header: Зона Ризику&trade;
        warning: >-
          <B class = "text-danger"> Увага: </ b> Відключення контролю доступу надасть повний доступ до Системи {appName}
          будь-кому, хто може зайти на цю сторінку або достукатися до API. Ми попереджали.
        confirmDisable: 'Ви впевнені? Натисніть ще раз, щоб дійсно відключити контроль доступу'
        disable: Вимкнути контроль доступу
      groupsField: 'Групи:'
      displayName: 'Ім''я користувача:'
      userName: 'Ім''я користувача:'
      userId: 'ID користувача:'
    disabled:
      header: 1. Налаштуйте Shibboleth аккаунт
      label: '{providerName} не налаштований'
      warning: >-
        Система {appName} може бути налаштована на надання доступу набору користувачів і / або груп директорії
        {providerName}. Прямо зараз це не налаштоване, так що всі, хто можуть зайти на цю сторінку (або достукатися до
        API) мають повний контроль над системою.
      name:
        labelText: Поле відображуваної назви
      username:
        labelText: Поле ім'я користувача
      uid:
        labelText: Поле UID
      groups:
        labelText: Групи полів
      testAuth:
        header: 2. Протестуйте і включіть авторизацію
        subtext: 'Перевірте правильність налаштування програми, шляхом авторизації з них:'
        buttonText:
          pre: Авторизуватись з IDP
          post: Чекаємо відповіді від IDP
    providerName:
      shibboleth: Shibboleth
  root:
    header: Контроль доступу
    providers:
      activeDirectory: Active Directory
      azureAd: Azure AD
      github: GitHub
      local: Локальні рахунки
      openldap: OpenLDAP
      shibboleth: Shibboleth
  github:
    standard: GitHub
    enterprise: GitHub Підприємство
    header:
      enabled:
        label: '{github} увімкнено'
        required: |
          {appName} налаштований для забезпечення доступу: {orgs, plural,
          =0 {немає жодної організації}
          =1 {для # організації}
          other {для # організацій}
          }, {users, plural,
          =0 {немає користувачів}
          =1 {і для # користувача}
          other {і для # користувачів}
          }.
        restricted: |
          {appName} налаштований для забезпечення доступу користувачам навколишнього середовища: {orgs, plural,
          =0 {немає жодної організації}
          =1 {для # організації}
          other {для # організацій}
          }, {users, plural,
          =0 {немає користувачів}
          =1 {і для # користувача}
          other {і для # користувачів}
          }.
        unrestricted: 'Система {appName} налаштована надавати доступ будь-якому користувачу {github}.'
      disabled:
        label: GitHub не настроєно
        warning: >-
          Система {appName} може бути налаштована на надання доступу до обраного набору користувачів GitHub та/або
          членам GitHub Організації. Прямо зараз це не налаштовано, так що всі, хто можуть зайти на цю сторінку (або
          достукатися до API) мають повний контроль над системою.
    authenticated:
      header:
        text: Авторизація
        enterpriseHostName: 'Хост Підприємства:'
        clientId:
          text: 'ID Клієнта:'
          helpText: Щоб переналаштувати GitHub інтеграцію - відключіть контроль доступу трохи нижче і налаштуйте його знову.
      disableAccess:
        header: Зона Ризику&trade;
        warning: >-
          <B class = "text-danger"> Увага: </ b> Відключення контролю доступу надасть повний доступ до Системи {appName}
          будь-кому, хто може зайти на цю сторінку або достукатися до API. Ми попереджали.
        confirmDisable: 'Ви впевнені? Натисніть ще раз, щоб дійсно відключити контроль доступу'
        disable: Вимкнути контроль доступу
    notAuthenticated:
      header: 1. Налаштуйте GitHub Додаток
      ul:
        li1:
          text: >-
            Для звичайного (хмарного) GitHub, <a href="https://github.com/settings/developers" target="_blank" rel="noopener noreferrer">
            натисніть тут </a>, щоб відкрити настройки Додатків в новій вкладці.
          ul:
            li1: 'Для Github Enterprise, зайдіть в свій аккаунт. Натисніть "Settings", потім "Applications".'
        li2:
          text: 'Натисніть "Register new application" і заповніть форму:'
          ul:
            li1: '<b>Application name:</b> <span class="text-muted"> Що завгодно, напр. My {appName}</span>'
            li2: '<b>URL Домашньої Сторінки:</b> '
            li3: '<b>Application description:</b> <span class="text-muted">Що завгодно, можете залишити порожнім</span>'
            li4: Авторизація URL зворотного виклику
        li3:
          text: 'Натисніть "Register Application" '
      form:
        header: '2. Налаштуйте {appName} на використання вашої програми для автентифікації'
        subtext: Скопіюйте Client ID і Secret з верхнього правого кута сторінки Вашого новоствореного Додатку.
        clientId:
          labelText: ID Клієнта
        clientSecret:
          labelText: Секрет Клієнта
        ghEnterprise:
          labelText: Використовувати приватну інсталяцію GitHub Enterprise
        isGHEnterprise:
          labelText: Використовуйте захищене з'єднання
        enterpriseHost:
          labelText: Хост Підприємства
          placeholder: напр. github.example.com
    testAuth:
      header: 3. Протестуйте і включіть авторизацію
      subtext: 'Переконайтеся, що ваш Додаток налаштовано правильно, протестувавши авторизацію з ним:'
      buttonText:
        pre: Авторизуватись з GitHub
        post: Чекаємо відповіді від GitHub
  azuread:
    header:
      enabled: Azure AD Авторизація <b>включена</b>
      disabled: Azure AD Авторизація <b class="text-warning"> не налаштована</b>
    subtext:
      enabled: 'Система {appName} налаштована надавати доступ до акаунтів з Azure AD'
      disabled: >-
        Система {appName} може бути налаштована надавати доступ набору облікових записів, визначеним у Azure AD. Прямо
        зараз це не налаштовано, так що всі, хто можуть зайти на цю сторінку (або достукатися до API) мають повний
        контроль над системою.
    enabled:
      header: Зона Ризику&trade;
      warning: >-
        <B class = "text-danger"> Увага: </ b> Відключення контролю доступу надасть повний доступ до Системи {appName}
        будь-кому, хто може зайти на цю сторінку або достукатися до API. Ми попереджали.
      reallyDisable: 'Ви впевнені? Натисніть ще раз, щоб дійсно відключити контроль доступу'
      promptDisable: Вимкнути контроль доступу
    configure:
      header: 1. Налаштуйте Azure AD аккаунт
      tenantId:
        label: ID Організації
        placeholder: Довгий рядок UUID.
        help: Скопіюйте з порталу Azure AD
      clientId:
        label: ID Клієнта
        placeholder: Довгий рядок з UUID
      domain:
        label: Домен
        placeholder: напр. youcompany.onmicrosoft.com
      adminAccountUsername:
        label: Ім'я користувача з правами адміністратора
        placeholder: напр. pasturesstack-admin
        help: 'Користувач, який може зчитувати інформацію про інших користувачів'
      adminAccountPassword:
        label: Пароль Адміна
    test:
      header: 2. Протестуйте і включіть авторизацію
      help: 'Перевірте, що все налаштовано правильно, протестувавши авторизацію з вашого профілю:'
      username:
        label: Логін
        placeholder: напр. admin
      password:
        label: Логін пароль
      pre: Авторизуватись з Azure
      post: Чекаємо відповіді від Azure
  localAuth:
    header:
      enabled: Вбудована Авторизація <b>включена</b>
      disabled: Вбудована Авторизація <b class="text-warning"> не налаштована</b>
    subtext:
      enabled:
        text: 'Система {appName} налаштована надавати доступ до акаунтів зі своєї власної бази даних.'
        linkText: Керування обліковими записами
      disabled: >-
        Система {appName} може бути налаштована надавати доступ набору облікових записів, визначеним у Azure AD. Прямо
        зараз це не налаштовано, так що всі, хто можуть зайти на цю сторінку (або достукатися до API) мають повний
        контроль над системою.
    accessEnabled:
      header: Зона Ризику&trade;
      warning: >-
        <B class = "text-danger"> Увага: </ b> Відключення контролю доступу надасть повний доступ до Системи {appName}
        будь-кому, хто може зайти на цю сторінку або достукатися до API. Ми попереджали.
      buttonText:
        disable: 'Ви впевнені? Натисніть ще раз, щоб дійсно відключити контроль доступу'
        prompt: Вимкнути контроль доступу
    accessDisabled:
      header: 1. Налаштування користувача з правами адміністратора
      helpText: 'Цей користувач буде адміном з повним доступом до Системи {appName}.'
