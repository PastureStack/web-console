      step5: >-
        Укажіть загальнодоступний IP, щоб зареєструватися на цьому хості. Якщо залишити порожнім, PastureStack виявить
        його автоматично. Встановіть його вручну, якщо хост знаходиться за брандмауером або NAT, або коли сервер
        керування та агент спільно використовують той самий хост.
      step6: 'Необов’язково: додайте мітки, які будуть застосовані до хосту.'
