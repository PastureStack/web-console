helpPage:
  header: Корисні посилання і інформація
  banner: Анонси
  releaseText: 'Випущений:'
  environment:
    header: Що таке Середовище?
    content: >
      <p>{appName} підтримує груповання ресурсів в різних середовищах. Кожен з них отримує свій власний набір послуг і
      ресурсів, інфраструктури, а також знаходиться у власності одного або кількох GitHub користувачів, груп або
      організацій.</p><p>Наприклад, можна створити окремо "dev", "test", і "production" середовище, щоб тримати речі,
      обмежені один від одного, а також дати "Dev" доступ до всієї організації, а обмежити «production» середовище для
      меньшої команди.</p>
    manageLink: Управляти Середовищами
  host:
    header: Що таке хост?
    content: >
      Перед додаванням першого сервісу або запуском контейнера додайте принаймні один Linux-хост із сумісною версією Docker. Хост має підключатися до сервера {appName} через HTTP. {appName} підтримує віртуальні та фізичні Linux-хости в публічних і приватних хмарах, а також у bare-metal-середовищах.
    contentLink: Детальніше
    addHostLink: Додати хост
  stacks:
    header: Що таке стеки і сервіси?
    content:
      paragraph1: >
        Сервіс - це всього-на-всього група контейнерів, створена з одного і того ж образу Docker, яка вміє
        використовувати розподілені DNS Системи {appName} для знаходження сервісів. Сервіси можуть бути додані вручну
        або шляхом розгортання їх з Каталогу.
      paragraph2: >-
        Сервіс також може використовуючи інших {appName} послуги, таких як балансування навантаження, контроль за станом
        здоров'я, оновлення та забезпечення високої доступності.
      link: Детальніше
    addServiceLink: Управляти Сервісами
    addCatalogLink: Додати з каталогу
    noHosts: 'Додайте хоча б один хост, щоб було, куди розгортати Сервіси.'
    manageServiceLink: Управляти Сервісами
  issues:
    header:
      text: Проблеми та документація
      tagline: 'Упс, знайшли помилку?'
      fileBug: Повідомити про помилку
    content:
      paragraph1: >
        {appName} — платформа з відкритим кодом, що надає спеціалізовану інфраструктуру для запуску контейнерів у
        робочому середовищі. Зі зростанням популярності контейнерів Docker підвищуються вимоги до мережевих служб,
        сховищ, балансування навантаження, безпеки, виявлення сервісів і керування ресурсами.
      graphic1:
        text: Знайшли помилку?
        link: Повідомити про проблему на GitHub
      graphic2:
        text: Для отримання додаткової інформації
        link: Документація
      graphic3:
        text: Потрібна допомога з виправлення неполадок?
        link: Загляньте в FAQ
  commercial:
    header: Комерційна підтримка
    content: |
      PastureStack підтримується спільнотою і не претендує на комерційну підтримку.
