      IPsec)</span>
    step3: 'Додатково: Додати позначкоку на хості.'
    step4: >-
      Укажіть загальнодоступний IP, щоб зареєструватися на цьому хості. Якщо залишити порожнім, PastureStack виявить
      його автоматично. Встановіть його вручну, якщо хост знаходиться за брандмауером або NAT, або коли сервер керування
      та агент спільно використовують той самий хост.
    agentIp:
      placeholder: напр. 1.2.3.4
    step5Copy: 'Скопіюйте і виконайте наступну команду, щоб зареєструвати хост'
    generating: Створення реєстрації URL...
    step5Close:
      part1: 'Натисніть кнопку Закрити, нижче.  Новий хост повинен з''явитися в меню'
      link: Хости
      part2: протягом однієї хвилини.
    close: Закрити
