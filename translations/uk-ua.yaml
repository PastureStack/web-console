      windowsHeader: Windows хост
      linuxHeader: Linux хост
      step1: >-
        Запустіть машину Windows Server 2016, інсталюйте <a href="https://docs.docker.com/engine/install/"
        target="_blank" rel="noopener noreferrer">Docker</a>і перегляньте <a
        href="{docsBase}/hosts/#supported-docker-versions" target="_blank" rel="noopener noreferrer">вказівки щодо
        сумісності хоста</a> до реєстрації.
      step2: 'Створити прозору мережу Docker:'
      step2Copy: docker network create -d transparent transparent
      step3: 'Скопіюйте і виконайте наступну команду нижче в PowerShell, для запуску {appName} агента.'
    windowsSteps:
      step1: >-
        Запустіть машину Windows Server 2016, інсталюйте <a href="https://docs.docker.com/engine/install/"
        target="_blank" rel="noopener noreferrer">Docker</a>і перегляньте <a
        href="{docsBase}/hosts/#supported-docker-versions" target="_blank" rel="noopener noreferrer">вказівки щодо
        сумісності хоста</a> до реєстрації.
      step2: 'Перевірте та встановіть функції RemoteAccess і маршрутизації в Windows:'
      step2Copy: 'Get-WindowsFeature -Name "RemoteAccess","Routing" | Install-WindowsFeature'
      step2Note: 'Примітка. Машину Windows потрібно буде перезавантажити, якщо програми були встановлені.'
      step3: >-
        Укажіть унікальну підмережу для хоста Windows. Щоб підтримувати накладену мережу в Windows, кожен хост у
        середовищі повинен мати унікальну підмережу.
      step4: >-
        Укажіть маршрутизатор IP для підмережі хоста. Цей IP використовується для пересилання мережевого трафіку між
        різними хостами.
