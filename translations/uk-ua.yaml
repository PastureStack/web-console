heroAddService:
  infra:
    header: Додати Стеки інфраструктури
    paragraph: >-
      Стеки інфраструктури додають {appName} такі можливості, як нові механізми оркестровки, постачальники сховищ і
      мереж.
  service:
    header: Додати перший стек
    paragraph1: >
      Сервіс - це всього-на-всього група контейнерів, створена з одного і того ж образу Docker, яка вміє використовувати
      розподілені DNS Системи {appName} для знаходження сервісів. Сервіси можуть бути додані вручну або шляхом
      розгортання їх з Каталогу.
    paragraph2: >-
      Сервіс також може використовуючи інших {appName} послуги, таких як балансування навантаження, контроль за станом
      здоров'я, оновлення та забезпечення високої доступності.
    contentLink: Детальніше
  addService: Додати сервіс
  addCatalog: Налаштувати
  linkToCatalog: Переглянути каталог
