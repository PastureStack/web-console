        login:
          labelText: Логін
          placeholder: напр. admin
        name:
          labelText: Повне ім'я
          placeholder: напр. Іван Гнатів
        password:
          labelText: Пароль
        confirmPassword:
          labelText: Підтвердьте пароль
    accessControl:
