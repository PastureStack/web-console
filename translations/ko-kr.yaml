    standard: GitHub
    enterprise: GitHub 기업
    header:
      enabled:
        label: '{github}가 활성화되었습니다'
        required: >
          {appName} 액세스를 허용하도록 구성되었습니다. {orgs, plural, =0 {조직 없음} =1 {# 조직} other {#개 조직}} 그리고 {users, plural, =0 {사용자
          없음} =1 {# 사용자} other {# 사용자}}.
        restricted: >
          {appName} 환경 구성원에 대한 액세스를 허용하도록 구성되었습니다. {orgs, plural, =0 {조직 없음} =1 {# 조직} other {#개 조직}} 그리고 {users,
          plural, =0 {사용자 없음} =1 {# 사용자} other {# 사용자}}.
        unrestricted: '{appName}는 모든 {github} 사용자에게 액세스를 허용하도록 구성됩니다.'
