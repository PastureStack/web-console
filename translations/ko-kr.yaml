        label: GitHub가 구성되지 않았습니다.
        warning: >-
          {appName}는 GitHub 사용자 및 조직 구성원 집합에 대한 액세스를 제한하도록 구성할 수 있습니다.  이는 현재 설정되어 있지 않으므로 이 페이지(또는 API)에 도달하는 사람은 누구나
          시스템에 대한 모든 권한을 갖습니다.
    authenticated:
      header:
        text: 인증
        enterpriseHostName: '엔터프라이즈 호스트:'
        clientId:
          text: '클라이언트 ID:'
          helpText: 구성된 GitHub 애플리케이션을 변경하려면 아래의 접근 제어를 비활성화한 후 다시 설정하세요.
      disableAccess:
        header: 위험지대™
        warning: '<b class="text-danger">주의:</b> 액세스 제어를 비활성화하면 이 페이지 또는 API에 접근할 수 있는 모든 사람에게 {appName}에 대한 완전한 제어권이 부여됩니다.'
        confirmDisable: 확실합니까?  액세스 제어를 실제로 비활성화하려면 다시 클릭하세요.
        disable: 액세스 제어 비활성화
    notAuthenticated:
      header: 1. GitHub 애플리케이션 설정
      ul:
        li1:
          text: >-
            표준 GitHub의 경우, <a href="https://github.com/settings/developers" target="_blank" rel="noopener noreferrer">여기를 클릭하세요</a> 새 창에서 애플리케이션
            설정으로 이동합니다.
          ul:
            li1: Github Enterprise의 경우 계정에 로그인하세요.  설정을 클릭한 다음 응용 프로그램을 클릭하세요.
        li2:
          text: '"새 애플리케이션 등록"을 클릭하고 양식을 작성하세요.'
          ul:
            li1: '<b>애플리케이션 이름:</b> <span class="text-muted">당신이 좋아하는 것이라면 무엇이든. 내 {appName}</span>'
            li2: '<b>홈페이지 URL: </b> '
            li3: '<b>애플리케이션 설명:</b> <span class="text-muted">당신이 좋아하는 것, 선택 사항</span>'
            li4: 승인 콜백 URL
        li3:
          text: '"응용프로그램 등록"을 클릭하세요 '
      form:
        header: '2. 인증을 위해 애플리케이션을 사용하도록 {appName}를 구성합니다.'
        subtext: 새로 생성된 애플리케이션의 오른쪽 상단에서 클라이언트 ID 및 비밀을 복사하여 붙여넣습니다.
        clientId:
          labelText: 클라이언트 ID
        clientSecret:
          labelText: 클라이언트 비밀번호
        ghEnterprise:
          labelText: 개인 GitHub 기업 설치 사용
        isGHEnterprise:
          labelText: 보안 연결 사용
        enterpriseHost:
          labelText: 엔터프라이즈 호스트
          placeholder: 예를 들어 github.example.com
    testAuth:
      header: 3. 인증 테스트 및 활성화
      subtext: 인증을 테스트하여 애플리케이션이 올바르게 구성되었는지 확인하세요.
      buttonText:
        pre: GitHub로 인증하세요
        post: GitHub의 답장을 기다리는 중
  azuread:
