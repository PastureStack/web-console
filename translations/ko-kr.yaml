      unrestricted: '{appName}는 모든 {providerName} 사용자에게 액세스를 허용하도록 구성됩니다.'
      authenticated:
        header:
          text: 인증
          helpText: 구성된 Shibboleth 애플리케이션을 변경하려면 아래의 접근 제어를 비활성화한 후 다시 설정하세요.
      disableAccess:
        header: 위험지대™
        warning: '<b class="text-danger">주의:</b> 액세스 제어를 비활성화하면 이 페이지 또는 API에 접근할 수 있는 모든 사람에게 {appName}에 대한 완전한 제어권이 부여됩니다.'
        confirmDisable: 확실합니까?  액세스 제어를 실제로 비활성화하려면 다시 클릭하세요.
        disable: 액세스 제어 비활성화
      groupsField: '그룹:'
      displayName: '표시 이름:'
      userName: '사용자 이름:'
      userId: '사용자 ID:'
    disabled:
      header: 1. Shibboleth 계정 구성
      label: '{providerName}가 구성되지 않았습니다.'
      warning: >-
        {appName}는 {providerName} 사용자 및 그룹 집합에 대한 액세스를 제한하도록 구성할 수 있습니다.  이는 현재 설정되어 있지 않으므로 이 페이지(또는 API)에 도달하는 사람은 누구나
        시스템에 대한 모든 권한을 갖습니다.
