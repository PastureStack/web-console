helpPage:
  header: 도움말
  banner: 공지사항
  releaseText: '출시:'
  environment:
    header: 환경이란 무엇입니까?
    content: |
      <p>{appName}는 리소스를 여러 환경으로 그룹화하는 것을 지원합니다. 각각은 고유한 서비스 및 인프라 리소스 세트를 가지며 하나 이상의 GitHub 사용자, 팀 또는 조직이 소유합니다.</p>
        <p>예를 들어 별도의 "개발", "테스트" 및 "프로덕션" 환경을 만들어 서로 격리된 상태를 유지하고 전체 조직에 "개발" 액세스 권한을 부여하지만 "프로덕션" 환경을 소규모 팀으로 제한할 수 있습니다.</p>
    manageLink: 환경 관리
  host:
    header: 호스트란 무엇입니까?
    content: >
      첫 번째 서비스를 추가하거나 컨테이너를 시작하기 전에 호환되는 Docker 버전을 실행하는 Linux 호스트를 하나 이상 추가하십시오. 호스트는 HTTP를 통해 {appName} 서버에 연결할 수 있어야 합니다. {appName}는 퍼블릭 클라우드, 프라이빗 클라우드 및 베어메탈 환경의 가상·물리 Linux 호스트를 지원합니다.
    contentLink: 자세히 알아보기
    addHostLink: 호스트 추가
  stacks:
    header: 스택과 서비스란 무엇입니까?
    content:
      paragraph1: >
        서비스는 단순히 동일한 Docker 이미지에서 생성된 컨테이너 그룹이지만 서비스 검색을 위해 {appName}의 경량 분산 DNS 서비스를 활용하기 위해 Docker의 "링크" 개념을 확장합니다.
        서비스는 개별적으로 추가하거나 카탈로그에서 항목을 배포하여 추가할 수 있습니다.
      paragraph2: '또한 서비스는 로드 밸런서, 상태 모니터링, 업그레이드 지원 및 고가용성과 같은 기타 {appName} 기본 제공 서비스를 활용할 수도 있습니다.'
      link: 자세히 알아보기
    addServiceLink: 서비스 관리
    addCatalogLink: 카탈로그에서 추가
    noHosts: 현재 호스트가 없습니다. 서비스를 추가하기 전에 호스트를 추가하세요.
    manageServiceLink: 서비스 관리
  issues:
    header:
      text: 문제 및 문서
      tagline: 문제를 발견하셨나요?
      fileBug: 문제 보고
    content:
      paragraph1: >
        {appName}는 프로덕션에서 컨테이너를 실행하기 위해 특별히 구축된 인프라를 구현하는 오픈 소스 소프트웨어 플랫폼입니다. Docker 컨테이너는 점점 더 대중화되는 애플리케이션 워크로드로서
        네트워킹, 스토리지, 로드 밸런서, 보안, 서비스 검색 및 리소스 관리와 같은 인프라 서비스에 새로운 요구 사항을 생성합니다.
      graphic1:
        text: 버그를 발견하셨나요?
        link: GitHub에 문제 보고
      graphic2:
        text: 자세한 정보
        link: 문서
      graphic3:
        text: 문제 해결에 도움이 필요하신가요?
        link: 자주 묻는 질문 확인
  commercial:
    header: 상업적 지원
    content: |
      PastureStack는 커뮤니티에서 관리되며 상업적 지원을 제공한다고 주장하지 않습니다.
