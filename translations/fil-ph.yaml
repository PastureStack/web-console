heroAddService:
  infra:
    header: Magdagdag ng Infrastructure Stacks
    paragraph: >-
      Ang mga stack ng imprastraktura ay nagdaragdag ng mga kakayahan tulad ng mga bagong Orchestration engine, storage
      at networking provider sa {appName}.
  service:
    header: Pagdaragdag ng Unang Application Stack
    paragraph1: >
      Ang service ay grupo ng mga container na ginawa mula sa iisang Docker image. Pinalalawak nito ang konsepto ng
      Docker 'link' gamit ang lightweight distributed DNS service ng {appName} para sa service discovery.

      Maaaring idagdag ang mga service nang paisa-isa o sa pamamagitan ng pag-deploy ng item mula sa Catalog.
    paragraph2: >-
      Maaari ring gamitin ng service ang mga built-in feature ng {appName}, gaya ng load balancing, health monitoring,
      upgrade support, at high availability.
