        href="{docsBase}/hosts/#supported-docker-versions" target="_blank" rel="noopener noreferrer">gabay sa
        compatibility ng host</a> bago magrehistro.
      step2: 'Lumikha ng isang transparent na Docker Network:'
      step2Copy: docker network create -d transparent transparent
      step3: 'Kopyahin, i-paste, at patakbuhin ang utos sa ibaba sa PowerShell upang simulan ang ahente ng {appName}.'
    windowsSteps:
      step1: >-
        Maghanda ng Windows Server 2016 host, i-install ang <a href="https://docs.docker.com/engine/install/"
        target="_blank" rel="noopener noreferrer">Docker</a>, at tingnan ang <a
        href="{docsBase}/hosts/#supported-docker-versions" target="_blank" rel="noopener noreferrer">gabay sa
        compatibility ng host</a> bago magrehistro.
      step2: 'Suriin at i-install ang RemoteAccess at Routing sa mga feature ng Windows:'
      step2Copy: 'Get-WindowsFeature -Name "RemoteAccess","Routing" | Install-WindowsFeature'
      step2Note: 'Tandaan: Ang Windows machine ay kailangang i-reboot kung ang mga application ay na-install.'
      step3: >-
        Tumukoy ng natatanging subnet para sa Windows host. Upang masuportahan ang isang overlay na network sa Windows,
        ang bawat host sa kapaligiran ay dapat na may natatanging subnet.
      step4: >-
        Tukuyin ang router IP para sa subnet ng host. Ang IP na ito ay ginagamit upang ipasa ang trapiko sa network sa
        pagitan ng iba't ibang mga host.
      routerIp:
        placeholder: hal. 1.2.3.4
      subnet:
        placeholder: hal. 192.168.0.0/24
      step5: >-
        Tukuyin ang pampublikong IP na gagamitin sa pagrehistro ng host na ito. Kapag blangko, awtomatiko itong
        tutukuyin ng PastureStack. Itakda ito nang manu-mano kapag nasa likod ng firewall o NAT ang host, o magkasama sa
        iisang host ang control server at agent.
