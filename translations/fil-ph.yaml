  title: Pumunta sa dokumentasyon
helpPage:
  header: Tulong
  banner: Mga anunsyo
  releaseText: 'Inilabas:'
  environment:
    header: Ano ang kapaligiran?
    content: >
      <p>Sinusuportahan ng {appName} ang pagpapangkat ng mga mapagkukunan sa maraming kapaligiran. Ang bawat isa ay
      nakakakuha ng sarili nitong hanay ng mga serbisyo at mapagkukunan ng imprastraktura, at pagmamay-ari ng isa o
      higit pang GitHub na user, team o organisasyon.</p>
        <p>Halimbawa, maaari kang lumikha ng hiwalay na "dev", "test", at "production" na kapaligiran upang panatilihing hiwalay ang mga bagay sa isa't isa, at bigyan ang "dev" ng access sa iyong buong organisasyon ngunit paghigpitan ang "production" environment sa isang mas maliit na team.</p>
    manageLink: Pamahalaan ang Mga Kapaligiran
  host:
    header: Ano ang host?
    content: >
      Bago idagdag ang unang serbisyo o maglunsad ng container, magdagdag ng kahit isang Linux host na gumagamit ng katugmang bersyon ng Docker. Dapat maabot ng host ang {appName} server sa pamamagitan ng HTTP. Sinusuportahan ng {appName} ang mga virtual at pisikal na Linux host sa pampublikong cloud, pribadong cloud, at bare-metal na kapaligiran.
    contentLink: Matuto pa
    addHostLink: Magdagdag ng Host
  stacks:
    header: Ano ang mga stack at serbisyo?
    content:
      paragraph1: >
        Ang service ay grupo ng mga container na ginawa mula sa iisang Docker image. Pinalalawak nito ang konsepto ng
        Docker "link" gamit ang lightweight distributed DNS service ng {appName} para sa service discovery. Maaaring
        idagdag ang mga service nang paisa-isa o sa pamamagitan ng pag-deploy ng item mula sa Catalog.
      paragraph2: >-
        Maaari ring gamitin ng service ang mga built-in feature ng {appName}, gaya ng load balancing, health monitoring,
        upgrade support, at high availability.
      link: Matuto pa
    addServiceLink: Pamahalaan ang Mga Serbisyo
    addCatalogLink: Idagdag Mula sa Catalog
    noHosts: Kasalukuyan kang walang host. Mangyaring magdagdag ng host bago magdagdag ng Mga Serbisyo.
    manageServiceLink: Pamahalaan ang Mga Serbisyo
  issues:
    header:
      text: Mga Problema at Dokumentasyon
      tagline: May nakita ka bang problema?
      fileBug: Mag-ulat ng Problema
    content:
      paragraph1: >
        Ang {appName} ay isang open source software platform na nagbibigay ng imprastrakturang sadyang binuo para
        magpatakbo ng mga container sa production environment. Habang mas ginagamit ang mga Docker container bilang
        application workload, lumalawak din ang mga pangangailangan sa networking, storage, load balancing, seguridad,
        service discovery, at resource management.
      graphic1:
        text: May nakita ka bang bug?
        link: Mag-ulat ng problema sa GitHub
      graphic2:
        text: Para sa higit pang impormasyon
        link: Dokumentasyon
      graphic3:
        text: Kailangan mo ba ng tulong sa pag-troubleshoot?
        link: Tingnan ang mga madalas itanong
  commercial:
    header: Suporta sa Komersyal
    content: |
      PastureStack ay pinananatili ng komunidad at hindi inaangkin na nagbibigay ng komersyal na suporta.
