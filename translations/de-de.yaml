helpPage:
  header: Hilfreiche Links und Informationen
  banner: Ankündigungen
  releaseText: 'Veröffentlicht:'
  environment:
    header: Was ist eine Umgebung?
    content: >
      <p>{appName} unterstützt das Zusammenfassen von Ressourcen in mehrere Umgebungen. Jede Umgebung erhält dabei ihre
      eigenen Services und Infrakstrukturkomponenten und wird von einem oder mehreren GitHub Anwendern, Teams oder
      Organsiationen verwaltet.</p>

      <p>Zum Beispiel können Sie separate "dev", "test" und "production" Umgebungen einrichten um die Services von
      einander zu trennen und z.B. der gesamten Organsiation "dev" Zugriff zu geben und die "production" Umgebung auf
      ein kleineres Team zu beschränken.</p>
    manageLink: Umgebungen verwalten
  host:
    header: Was ist ein Host?
    content: >
      Bevor Sie den ersten Service hinzufügen oder einen Container starten, fügen Sie mindestens einen Linux-Host mit einer kompatiblen Docker-Version hinzu. Der Host muss den {appName}-Server über HTTP erreichen können. {appName} unterstützt virtuelle und physische Linux-Hosts in öffentlichen Clouds, privaten Clouds und Bare-Metal-Umgebungen.
    contentLink: Mehr erfahren
    addHostLink: Host hinzufügen
  stacks:
    header: Was sind Stacks und Services?
    content:
      paragraph1: >
        Ein Service ist einfach eine Gruppe von Containern die aus dem selben Docker Image erstellt wurden, erweitert
        aber Docker's 'link' Konzept um {appName}'s leichtgewichtigen Distributed DNS Service für Service Discovery zu
        nutzen. Services können einzeln oder aus dem Katalog hinzugefügt werden.
      paragraph2: >-
        Ein Service kann zusätzlich andere in {appName} integrierte Services wie Load-Balancer, Aktivitätsüberwachung,
        Upgrade Support und Hochverfügbarkeit nutzen.
      link: Mehr erfahren
    addServiceLink: Services verwalten
    addCatalogLink: Aus dem Katalog hinzufügen
    noHosts: Aktuell sind keine Hosts vorhanden. Bitte fügen Sie zunächst einen Host hinzu.
    manageServiceLink: Services verwalten
  issues:
    header:
      text: Probleme und Dokumentation
      tagline: 'Oh oh, einen Fehler gefunden?'
      fileBug: Einen Fehler melden
    content:
      paragraph1: >
        {appName} ist eine Open-Source-Softwareplattform, die eine speziell entwickelte Infrastruktur für den Betrieb
        von Containern in Produktionsumgebungen bereitstellt. Docker-Container werden als Anwendungs-Workload immer
        beliebter und stellen neue Anforderungen an Infrastrukturdienste wie Netzwerk, Speicher, Lastverteilung,
        Sicherheit, Diensterkennung und Ressourcenverwaltung.
      graphic1:
        text: Einen Fehler gefunden?
        link: Ein Problem auf GitHub melden
      graphic2:
        text: Für weitere Informationen
        link: Dokumentation
      graphic3:
        text: Benötigen Sie Hilfe bei der Fehlersuche?
        link: Häufig gestellte Fragen anzeigen
  commercial:
    header: Kommerzieller Support
    content: |
      PastureStack wird von der Community gepflegt und erhebt keinen Anspruch auf kommerzielle Unterstützung.
