      step1: >-
        Indítson el egy Windows Server 2016-os gépet, telepítse <a href="https://docs.docker.com/engine/install/"
        target="_blank" rel="noopener noreferrer">Docker</a>, és tekintse át a <a
        href="{docsBase}/hosts/#supported-docker-versions" target="_blank" rel="noopener noreferrer">állomás
        kompatibilitási útmutató</a> regisztráció előtt.
      step2: 'Ellenőrizze és telepítse a RemoteAccess és az útválasztást a Windows szolgáltatásban:'
      step2Copy: 'Get-WindowsFeature -Name "RemoteAccess","Routing" | Install-WindowsFeature'
      step2Note: 'Megjegyzés: A Windows gépet újra kell indítani, ha az alkalmazások telepítve voltak.'
      step3: >-
        Adjon meg egy egyedi alhálózatot a Windows gazdagéphez. A Windows átfedő hálózatának támogatásához a
        környezetben minden gazdagépnek egyedi alhálózattal kell rendelkeznie.
      step4: >-
        Adja meg a IP útválasztót a gazdagép alhálózatához. Ez a IP a hálózati forgalom továbbítására szolgál a
        különböző gazdagépek között.
      routerIp:
        placeholder: pl. 1.2.3.4
      subnet:
        placeholder: pl. 192.168.0.0/24
      step5: >-
        Adja meg a nyilvános IP-t, hogy regisztráljon ehhez a gazdagéphez. Ha üresen marad, a PastureStack automatikusan
        észleli. Állítsa be manuálisan, ha a gazdagép tűzfal vagy NAT mögött van, vagy ha a vezérlőkiszolgáló és az
        ügynök ugyanazon a gazdagépen osztozik.
      step6: 'Nem kötelező: Adjon hozzá címkéket, amelyeket a gazdagépre kíván alkalmazni.'
      step7: 'Másolja, illessze be és futtassa az alábbi parancsot a PowerShell-ben a {appName} ügynök elindításához.'
