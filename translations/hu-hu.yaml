helpBtn:
  title: Menjen a dokumentációhoz
helpPage:
  header: Hasznos linkek & információk
  banner: Bejelentések
  releaseText: 'Megjelent:'
  environment:
    header: Mi az a Környezet?
    content: >
      <p>A {appName} támogatja az erőforrások több környezetbe történő csoportosítását. Mindegyik saját
      szolgáltatáskészlettel és infrastrukturális erőforrásokkal rendelkezik, és egy vagy több GitHub felhasználó,
      csapat vagy szervezet tulajdonában van.</p>
        <p>Létrehozhat például külön "fejlesztő", "teszt" és "gyártási" környezetet, hogy a dolgokat elszigetelje egymástól, és "fejlesztői" hozzáférést biztosítson a teljes szervezethez, de korlátozza a "gyártási" környezetet egy kisebb csapatra.</p>
    manageLink: Környezetek kezelése
  host:
    header: Mi a hoszt?
    content: >
      Az első szolgáltatás hozzáadása vagy egy konténer elindítása előtt adjon hozzá legalább egy, kompatibilis Docker-verziót futtató Linux-gazdagépet. A gazdagépnek HTTP-n keresztül el kell érnie a {appName} szervert. A {appName} támogatja a virtuális és fizikai Linux-gazdagépeket nyilvános és privát felhőkben, valamint bare-metal környezetekben.
    contentLink: Tudj meg többet
    addHostLink: Hoszt hozzáadása
  stacks:
    header: Mik azok a Kötegek és Szolgáltatások?
    content:
      paragraph1: >
        A szolgáltatás egyszerűen tárolók csoportja, amelyet ugyanabból a Docker képfájlból hoztak létre, de kiterjeszti
        a Docker "link" koncepcióját, hogy kihasználja a {appName} könnyű elosztott DNS szolgáltatását a
        szolgáltatáskereséshez. A szolgáltatások egyenként vagy a katalógusból egy elem telepítésével adhatók hozzá.
      paragraph2: >-
        Egy szolgáltatás más beépített {appName} szolgáltatásokat is képes kihasználni, például terheléselosztókat,
        állapotfigyelést, frissítési támogatást és magas rendelkezésre állást.
      link: Tudj meg többet
    addServiceLink: Szolgáltatások kezelése
    addCatalogLink: Hozzáadás Katalógusból
    noHosts: Jelenleg nincsenek hosztjaid. Kérlek adj hozzá egy hosztot mielőtt szolgáltatást adnál hozzá.
    manageServiceLink: Szolgáltatások kezelése
  issues:
    header:
      text: Problémák és Dokumentáció
      tagline: 'Húha, hibát találtál?'
      fileBug: Hiba jelentése
    content:
      paragraph1: >
        A {appName} egy nyílt forráskódú szoftverplatform, amely egy erre a célra épített infrastruktúrát valósít meg a
        konténerek éles üzemben történő futtatásához. A Docker konténerek, mint egyre népszerűbb alkalmazások
        munkaterhelése, új követelményeket támasztanak az olyan infrastrukturális szolgáltatásokban, mint a hálózat, a
        tárolás, a terheléselosztó, a biztonság, a szolgáltatáskeresés és az erőforrás-kezelés.
      graphic1:
        text: Hibát talált?
        link: Hiba jelentése a GitHubon.
      graphic2:
        text: További információhoz
        link: Dokumentáció
      graphic3:
        text: Segítségre van szüksége a hibaelhárításhoz?
        link: Nézd meg a GYIK oldalunkon
  commercial:
    header: Kereskedelmi támogatás
    content: |
      A PastureStack közösség által fenntartott, és nem állítja, hogy kereskedelmi támogatást nyújt.
