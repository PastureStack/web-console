          labelText: استفاده از اتصال امن
        enterpriseHost:
          labelText: میزبان Enterprise
          placeholder: مثال. github.example.com
    testAuth:
      header: 3. تست و فعال سازی احراز هویت
      subtext: 'با آزمایش احراز هویت با آن، بررسی کنید که برنامه شما به درستی پیکربندی شده است:'
