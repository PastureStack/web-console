        header:
          text: احراز هویت
          helpText: 'برای تغییر Shibboleth application, کنترل دسترسی زیر را غیر فعال کرده و دوباره تنظیم کنید.'
      disableAccess:
        header: منطقه خطر&trade;
        warning: >-
          <b class="text-danger">احتیاط:</b> غیرفعال کردن کنترل دسترسی، کنترل کامل {appName} را به هر کسی که بتواند به
          این صفحه یا API دسترسی پیدا کند، می دهد.
        confirmDisable: آیا مطمئن هستید؟  برای تایید عیر فعال سازی دوباره کلیک کنید.
        disable: غیر فعال سازی کنترل دسترسی
