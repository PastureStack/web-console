      step2: 'یک شبکه شفاف Docker ایجاد کنید:'
      step2Copy: docker network create -d transparent transparent
      step3: 'دستور زیر را در PowerShell کپی، پیست و اجرا کنید تا عامل {appName} راه اندازی شود.'
    windowsSteps:
      step1: >-
        یک دستگاه Windows Server 2016 راه اندازی کنید، نصب کنید <a href="https://docs.docker.com/engine/install/"
        target="_blank" rel="noopener noreferrer">Docker</a>، و بررسی کنید <a
        href="{docsBase}/hosts/#supported-docker-versions" target="_blank" rel="noopener noreferrer">راهنمای سازگاری
        میزبان</a> قبل از ثبت نام
      step2: 'ویژگی‌های RemoteAccess و Routing را در Windows بررسی و نصب کنید:'
      step2Copy: 'Get-WindowsFeature -Name "RemoteAccess","Routing" | Install-WindowsFeature'
      step2Note: 'توجه: اگر برنامه‌ها نصب شده باشند، دستگاه Windows باید راه‌اندازی مجدد شود.'
      step3: >-
        یک زیر شبکه منحصر به فرد برای میزبان Windows مشخص کنید. به منظور پشتیبانی از یک شبکه همپوشانی در Windows، هر
        میزبان در محیط باید یک زیرشبکه منحصر به فرد داشته باشد.
      step4: روتر IP را برای زیر شبکه میزبان مشخص کنید. این IP برای انتقال ترافیک شبکه بین میزبان‌های مختلف استفاده می شود.
      routerIp:
        placeholder: به عنوان مثال 1.2.3.4
      subnet:
        placeholder: به عنوان مثال 192.168.0.0/24
      step5: >-
        IP عمومی را برای ثبت نام در این میزبان مشخص کنید. اگر خالی بماند، PastureStack آن را به طور خودکار تشخیص می دهد.
        هنگامی که میزبان پشت فایروال یا NAT قرار دارد، یا زمانی که سرور کنترل و عامل یک میزبان را به اشتراک می گذارند،
        آن را به صورت دستی تنظیم کنید.
      step6: 'اختیاری: برچسب‌هایی را اضافه کنید تا به میزبان اعمال شوند.'
      step7: 'دستور زیر را در PowerShell کپی، پیست و اجرا کنید تا عامل {appName} راه اندازی شود.'
