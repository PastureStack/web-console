helpPage:
  header: راهنما و پیوندهای مفید
  banner: اطلاعیه ها
  releaseText: 'منتشر شد:'
  environment:
    header: محیط چیست؟
    content: >
      <p>{appName} امکان گروه‌بندی منابع در چند محیط را فراهم می‌کند. هر محیط مجموعه مستقلی از سرویس‌ها و منابع زیرساختی دارد
      و به یک یا چند کاربر، تیم یا سازمان اختصاص می‌یابد.</p>
        <p> برای مثال، ممکن است محیط‌های جداگانه «dev»، «test» و «production» ایجاد کنید تا چیزها را از یکدیگر جدا نگه دارید، و به «dev» اجازه دسترسی به کل سازمان خود بدهید، اما محیط «تولید» را به یک تیم کوچک‌تر محدود کنید.</p>
    manageLink: مدیریت محیط‌ها
  host:
    header: میزبان چیست؟
    content: >
      پیش از افزودن نخستین سرویس یا راه‌اندازی یک کانتینر، دست‌کم یک میزبان Linux با نسخه سازگار Docker اضافه کنید. میزبان باید بتواند از طریق HTTP به سرور {appName} متصل شود. {appName} از میزبان‌های مجازی و فیزیکی Linux در ابرهای عمومی، ابرهای خصوصی و محیط‌های سخت‌افزاری پشتیبانی می‌کند.
    contentLink: اطلاعات بیشتر
    addHostLink: افزودن میزبان
  stacks:
    header: پشته‌ها و سرویس‌ها چه هستند؟
    content:
      paragraph1: >
        یک سرویس به سادگی مجموعه‌ای از کانتینرها است که از همان تصویر Docker ایجاد شده‌اند، اما مفهوم «پیوند» Docker را
        گسترش می‌دهد تا از سرویس DNS توزیع‌شده و سبک {appName} برای کشف سرویس استفاده کند. سرویس‌ها را می‌توان به‌صورت
        جداگانه یا با استقرار یک مورد از کاتالوگ اضافه کرد.
      paragraph2: >-
        هر سرویس می‌تواند از قابلیت‌های داخلی {appName} مانند متعادل‌کننده بار، پایش سلامت، پشتیبانی از ارتقا و دسترس‌پذیری بالا استفاده کند.
      link: اطلاعات بیشتر
    addServiceLink: مدیریت سرویس‌ها
    addCatalogLink: افزودن از کاتالوگ
    noHosts: در حال حاضر هیچ میزبانی ندارید. لطفاً پیش از افزودن سرویس، یک میزبان اضافه کنید.
    manageServiceLink: مدیریت سرویس‌ها
  issues:
    header:
      text: مشکلات و مستندات
      tagline: مشکلی پیدا کرده‌اید؟
      fileBug: گزارش مشکل
    content:
      paragraph1: >
        {appName} یک پلت فرم نرم افزار منبع باز است که زیرساخت هدفمندی را برای اجرای کانتینرها در تولید پیاده سازی می
        کند. کانتینرهای Docker، به‌عنوان یک حجم کاری برنامه‌ای که به طور فزاینده‌ای محبوب می‌شود، نیازمندی‌های جدیدی را
        در خدمات زیرساختی مانند شبکه، ذخیره‌سازی، متعادل‌کننده بار، امنیت، کشف خدمات و مدیریت منابع ایجاد می‌کند.
      graphic1:
        text: مشکلی پیدا کرده‌اید؟
        link: گزارش مشکل در GitHub
      graphic2:
        text: برای اطلاعات بیشتر
        link: مستندات
      graphic3:
        text: نیاز به راهنمایی دارید؟
        link: پرسش‌های متداول را بررسی کنید
