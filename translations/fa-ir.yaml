          text: ' "Register new application" را انتخاب و فرم را پر کنید:'
          ul:
            li1: '<b>نام Application :</b> <span class="text-muted">Anything you like, مثال. My {appName}</span>'
            li2: '<b>آدرس صفحه خانه: </b> '
