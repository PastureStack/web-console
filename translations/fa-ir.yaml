    header:
      title: Shibboleth احراز هویت
    enabled:
      header: '{providerName} فعال است'
      required: >
        {appName} پیکربندی شده است تا اجازه دسترسی به {orgs, plural, =0 {هیچ سازمانی} =1 {#سازمان} other {# سازمان}} و
