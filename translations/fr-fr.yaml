        href="{docsBase}/hosts/#supported-docker-versions" target="_blank" rel="noopener noreferrer">conseils de
        compatibilité des hôtes</a> avant l'inscription.
      step2: "Créer un réseau Docker transparent\_:"
      step2Copy: docker network create -d transparent transparent
      step3: 'Copiez, collez et exécutez la commande ci-dessous dans PowerShell pour démarrer l’agent de {appName}.'
    windowsSteps:
      step1: >-
        Démarrez une machine Windows Server 2016, installez <a href="https://docs.docker.com/engine/install/"
        target="_blank" rel="noopener noreferrer">Docker</a>, et examinez le <a
        href="{docsBase}/hosts/#supported-docker-versions" target="_blank" rel="noopener noreferrer">conseils de
        compatibilité des hôtes</a> avant l'inscription.
      step2: "Vérifiez et installez les fonctionnalités RemoteAccess et Routage dans Windows\_:"
      step2Copy: 'Get-WindowsFeature -Name "RemoteAccess","Routing" | Install-WindowsFeature'
      step2Note: 'Remarque : la machine Windows devra être redémarrée si les applications ont été installées.'
      step3: >-
        Spécifiez un sous-réseau unique pour l'hôte Windows. Afin de prendre en charge un réseau superposé dans Windows,
        chaque hôte de l'environnement doit disposer d'un sous-réseau unique.
      step4: >-
        Spécifiez le routeur IP pour le sous-réseau de l'hôte. Ce IP est utilisé pour transférer le trafic réseau entre
        les différents hôtes.
