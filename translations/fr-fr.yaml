  title: Aller à la documentation
helpPage:
  header: Liens utiles & Information
  banner: Annonces
  releaseText: 'Publié:'
  environment:
    header: "Qu'est-ce qu' un environnement\_?"
    content: >
      <p>{appName} permet de regrouper les ressources en de multiples environnements. Chacun ayant ses propres
      ressources d'infrastructure et de services, et appartenant à un ou plusieurs utilisateurs, groupes ou
      organisations Github.</p>

      <p>Par exemple, Il est possible de créer des environnements séparés de "dev", "test", et "production" pour garder
      les ressources isolées les unes des autres, donner un accès "développeur" à toute votre organisation, et
      restreindre l'accès à l'environnement de "production" à une plus petite équipe.</p>
    manageLink: Manage Environnements
  host:
    header: Qu'est-ce qu'un hôte ?
    content: >
      Avant d’ajouter votre premier service ou de lancer un conteneur, ajoutez au moins un hôte Linux utilisant une version compatible de Docker. L’hôte doit pouvoir joindre le serveur {appName} via HTTP. {appName} prend en charge les hôtes Linux virtuels et physiques dans les clouds publics, les clouds privés et les environnements bare metal.
    contentLink: En savoir plus
    addHostLink: Ajouter un Hôte
  stacks:
    header: "Que sont les services et les stacks (stacks)\_?"
    content:
      paragraph1: "Un service est simplement un groupe de conteneurs créés à partir de la même image Docker, mais étend la notion de «\_lien\_» Docker afin de tirer parti du service léger de DNS distribué de {appName} pour la découverte de service. Les Services peuvent être ajoutés individuellement ou en déployant un élément du catalogue.\n"
      paragraph2: >-
        Un service est également capable de tirer parti d'autres services intégrés de {appName} comme les équilibreurs
        de charge, la surveillance de la santé, la mise à niveau et la haute disponibilité.
      link: En savoir Plus
    addServiceLink: Gérer les Services
    addCatalogLink: Ajouter depuis le Catalogue
    noHosts: 'Vous n’avez actuellement aucun hôte. Ajoutez, s’il vous plaît, un hôte avant d’ajouter des Services.'
    manageServiceLink: Gérer les Services
  issues:
    header:
      text: Problèmes et documentation
      tagline: Avez-vous rencontré un problème ?
      fileBug: Signaler un problème
    content:
      paragraph1: >
        {appName} est une plateforme logicielle open source qui fournit une infrastructure spécialement conçue pour
        exécuter des conteneurs en production. L’utilisation croissante des conteneurs Docker impose de nouvelles
        exigences aux services d’infrastructure, notamment au réseau, au stockage, à l’équilibrage de charge, à la
        sécurité, à la découverte de services et à la gestion des ressources.
      graphic1:
        text: "Trouver un bug\_?"
        link: Signaler un problème sur GitHub
      graphic2:
        text: Pour plus d'Information
        link: Documentation
      graphic3:
        text: "Besoin d’aide au dépannage\_?"
        link: Consulter notre Foire Aux Questions
  commercial:
    header: Support commercial
    content: |
      PastureStack est maintenu par la communauté et ne prétend pas fournir de support commercial.
