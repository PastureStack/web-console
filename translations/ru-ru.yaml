  title: Перейти к документации
helpPage:
  header: Полезные ссылки и информация
  banner: Анонсы
  releaseText: 'Когда:'
  environment:
    header: Что такое Окружение?
    content: >
      <p>Система {appName} позволяет группировать наборы ресурсов в Окружения. Каждое из них содержит свой собственный
      набор сервисов и инфраструктурных компонент, и может быть доступно одному или нескольким пользователям ГитХаба,
      командам или организациям.</p>

      <p>К примеру, Вы можете создать отдельные Окружения "dev", "test" и "production", чтобы отделять овец от
      бифштексов и иметь возможность дать доступ к "dev" всей компании, при этом оставив окружение
      &quot;production&quot; доступным более узкому кругу лиц.</p>
    manageLink: Управлять Окружениями
  host:
    header: Что такое хост?
    content: >
      Перед добавлением первого сервиса или запуском контейнера добавьте хотя бы один Linux-хост с совместимой версией Docker. Хост должен подключаться к серверу {appName} по HTTP. {appName} поддерживает виртуальные и физические Linux-хосты в публичных и частных облаках, а также в bare-metal-средах.
    contentLink: Подробнее здесь
    addHostLink: Добавить хост
  stacks:
    header: Что такое стеки и сервисы?
    content:
      paragraph1: >
        Сервис - это всего-навсего группа контейнеров, созданная из одного и того же образа Docker, которая умеет
        использовать распределенный лекговесный DNS Системы {appName} для нахождения сервисов, дополнительно к
        концепциио Docker "линка". Сервисы могут быть добавлены вручную или путем разворачивания их из Каталога.
      paragraph2: >-
        Сервисы так же могут использовать другие встроенные службы Системы {appName}, такие как балансировщики нагрузки,
        мониторинг здоровья (?), поддержку обновлений и высокодоступность.
      link: Читать подробнее
    addServiceLink: Управлять Сервисами
    addCatalogLink: Добавить из Каталога
    noHosts: 'Добавьте хотя бы один хост, чтобы было, куда разворачивать Сервисы.'
    manageServiceLink: Управлять Сервисами
  issues:
    header:
      text: Проблемы и документация
      tagline: 'Упс, нашли ошибку?'
      fileBug: Сообщить о проблеме
    content:
      paragraph1: >
        {appName} — платформа с открытым исходным кодом, предоставляющая специализированную инфраструктуру для запуска
        контейнеров в производственной среде. По мере роста популярности контейнеров Docker повышаются требования к
        сетевым службам, хранилищам, балансировке нагрузки, безопасности, обнаружению сервисов и управлению ресурсами.
      graphic1:
        text: Нашли ошибку?
        link: Сообщить о проблеме на GitHub
      graphic2:
        text: Чтобы узнать больше
        link: Документация
      graphic3:
        text: Нужна помощь в разборе проблемы?
        link: Загляните в FAQ
  commercial:
    header: Рекламная пауза
    content: |
      PastureStack поддерживается сообществом и не претендует на коммерческую поддержку.
