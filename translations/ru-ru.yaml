authPage:
  shibboleth:
    header:
      title: Shibboleth аутентификация
    enabled:
      header: '{providerName} включен'
      required: >
        {appName} настроен на разрешение доступа к {orgs, plural, =0 {нет организаций} =1 {# организация} other {#
        организации}} и {users, plural, =0 {нет пользователей} =1 {# пользователь} other {# пользователей}}.
      restricted: >
        {appName} настроен на разрешение доступа к членам среды, {orgs, plural, =0 {нет организаций} =1 {# организация}
        other {# организации}} и {users, plural, =0 {нет пользователей} =1 {# пользователь} other {# пользователей}}.
      unrestricted: '{appName} настроен на разрешение доступа любому пользователю {providerName}.'
      authenticated:
        header:
          text: Аунтификация
          helpText: Чтобы перенастроить Shibboleth интеграцию - отключите контроль доступа чуть ниже и настройте всё по-новой.
      disableAccess:
        header: Опасная Зона&trade;
        warning: >-
          <b class="text-danger">Внимание:</b> Отключение контроля доступа предоставит полный доступ к Системе {appName}
          любому, кто может зайти на эту страницу или достучаться до API. Мы предупреждали.
        confirmDisable: 'Вы уверены?  Нажмите еще раз, чтобы действительно отключить контроль доступа.'
        disable: Отключить контроль доступа
      groupsField: 'Группы:'
      displayName: 'Отображаемое имя:'
      userName: 'Логин:'
      userId: 'ID пользователя:'
    disabled:
      header: 1. Настройте учетную запись Shibboleth
      label: '{providerName} не настроен'
      warning: >-
        Система {appName} может быть настроена на предоставление доступа набору пользователей и/или групп директории
        {providerName}. Прямо сейчас это не настроено, так что все, кто могут зайти на эту страницу (или достучаться до
        API) имеют полный контроль над системой. Не порядок.
      name:
        labelText: Отображаемое имя поля
      username:
        labelText: Поле имени пользователя
      uid:
        labelText: Поле UID
      groups:
        labelText: Поле группы
      testAuth:
        header: 2. Протестируйте и включите аунтификацию
        subtext: 'Проверьте правильность настройки приложения путем проверки подлинности с ним:'
        buttonText:
          pre: Аунтефицироваться с IDP
          post: Жду ответа от IDP
    providerName:
      shibboleth: Shibboleth
  root:
    header: Контроль доступа
    providers:
      activeDirectory: Active Directory
      azureAd: Azure AD
      github: GitHub
      local: Локальные учетные записи
      openldap: OpenLDAP
      shibboleth: Shibboleth
  github:
    standard: ГитХаб
    enterprise: Энтерпрайз ГитХаб
    header:
      enabled:
        label: '{github} включен'
        required: |
          Система {appName} настроена {orgs, plural,
          =0 {не предоставлять доступ никаким организациям}
          =1 {предоставлять доступ одной организации}
          other {предоставлять доступ # организациям}
          } и {users, plural,
          =0 {ни одному пользователю}
          =1 {одному пользователю}
          other {# пользователям}
          }.
        restricted: |
          Система {appName} настроена предоставлять доступ членам окружения, {orgs, plural,
          =0 {ни одной организации}
          =1 {одной организации}
          other {# организациям}
          } и {users, plural,
          =0 {ни одному пользователю}
          =1 {одному пользователю}
          other {# пользователям}
          }.
        unrestricted: 'Система {appName} настроена предоставлять доступ любому пользователю {github}а.'
      disabled:
        label: Аунтификация черех ГитХаб не настроена
        warning: >-
          Система {appName} может быть настроена на предоставление доступа выбранному набору пользователей ГитХаба и/или
          членам ГитХаб Организации. Прямо сейчас это не настроено, так что все, кто могут зайти на эту страницу (или
          достучаться до API) имеют полный контроль над системой. Не порядок!
    authenticated:
      header:
        text: Аунтификация
        enterpriseHostName: 'Корпоративный хост:'
        clientId:
          text: 'ID Клиента:'
          helpText: Чтобы перенастроить ГитХаб интеграцию - отключите контроль доступа чуть ниже и настройте всё по-новой.
      disableAccess:
        header: Зона Риска&trade;
        warning: >-
          <b class="text-danger">Внимание:</b> Отключение контроля доступа предоставит полный доступ к Системе {appName}
          любому, кто может зайти на эту страницу или достучаться до API. Мы предупреждали!
        confirmDisable: >-
          Вы хорошо подумали? Если да - нажмите еше раз, чтобы окончательно отключить контроль доступа. Мы
          предупреждали.
        disable: Отключай уже!
    notAuthenticated:
      header: 1. Настройте ГитХаб Приложение
      ul:
        li1:
          text: >-
            Для обычного (облачного) ГитХаба, <a href="https://github.com/settings/developers" target="_blank" rel="noopener noreferrer">нажмите
            тут</a>, чтобы открыть настройки Приложений в новой вкладке.
          ul:
            li1: 'Для Энтерпрайз ГитХаба, зайдите в свою учётку. Нажмите "Settings", затем "Applications".'
        li2:
          text: 'Нажмите "Register new application" и заполните форму:'
          ul:
            li1: '<b>Application name:</b> <span class="text-muted">Что угодно, напр. My {appName}</span>'
            li2: '<b>URL главной страницы:</b> '
            li3: '<b>Application description:</b> <span class="text-muted">Что угодно, можете оставить пустым</span>'
            li4: Обратный вызов авторизации URL
        li3:
          text: 'Нажмите "Register Application" '
      form:
        header: '2. Настройте {appName} для использования вашего приложения для аутентификации.'
        subtext: Скопируйте Client ID и Secret из вернего правого угла странцы Вашего свежесозданного Приложения.
        clientId:
          labelText: ID Клиента (Client ID)
        clientSecret:
          labelText: Секрет Клиента (Client Secret)
        ghEnterprise:
          labelText: Использовать частную инсталляцию Энтерпрайз ГитХаба
        isGHEnterprise:
          labelText: Использовать шифрование
        enterpriseHost:
          labelText: Хостнэйм Энтерпрайз ГитХаба
          placeholder: напр. github.example.com
    testAuth:
      header: 3. Протестируйте и включите аунтификацию
      subtext: 'Проверьте, что ваше Приложение настроено правильно, протестировав аунтификацию с ним:'
      buttonText:
        pre: Аунтефицироваться с ГитХабом
        post: Ожидаем ответа от ГиХаба
  azuread:
    header:
      enabled: Аунтификация через Azure AD <b>включена</b>
      disabled: Аунтификация через Azure AD <b class="text-warning">не настроена</b>
    subtext:
      enabled: 'Система {appName} настроена предоставлять доступ учёткам из Azure AD'
      disabled: >-
        Система {appName} может быть настроена предоставлять доступ  набору учёток, определенному в Azure AD. Прямо
        сейчас это не настроено, так что все, кто могут зайти на эту страницу (или достучаться до API) имеют полный
        контроль над системой. Не порядок!
    enabled:
      header: Зона Риска&trade;
      warning: >-
        <b class="text-danger">Внимание:</b> Отключение контроля доступа предоставит полный доступ к Системе {appName}
        любому, кто может зайти на эту страницу или достучаться до API. Мы предупреждали!
      reallyDisable: Вы хорошо подумали? Если да - нажмите еше раз.
      promptDisable: Отключай уже!
    configure:
      header: 1. Настройте Azure AD учётку
      tenantId:
        label: ID Организации (Tenant ID)
        placeholder: Длинная строка UUID
        help: Скопируйте с портала Azure AD
      clientId:
        label: ID Клиента (Client ID)
        placeholder: Длинная строка с УИДом (UUID)
      domain:
        label: Домен
        placeholder: Напр. youcompany.onmicrosoft.com
      adminAccountUsername:
        label: Имя пользователя с правами администратора
        placeholder: например пастбище-администратор
        help: 'Пользователь, который может считывать информацию о других пользователях'
      adminAccountPassword:
        label: Пароль
    test:
      header: 2. Протестируйте и включите аунтификацию
      help: 'Проверьте, что все настроено правильно, протестировав аунтификацию с вашей учёткой:'
      username:
        label: Имя пользователя
        placeholder: Напр. jsmith
      password:
        label: Пароль
      pre: Аунтефицироваться с Azure
      post: Ожидаем ответа от Azure
  localAuth:
    header:
      enabled: Встроенная аунтификация <b>включена</b>
      disabled: Встроенная аунтификация <b class="text-warning">не настроена</b>
    subtext:
      enabled:
        text: 'Система {appName} настроена предоставлять доступ учёткам из своей собственной базы данных'
        linkText: Управление учётками
      disabled: >-
        Система {appName} может быть настроена предоставлять доступ  набору учёток, определенному в собственной базе
        данных Системы {appName}. Прямо сейчас это не настроено, так что все, кто могут зайти на эту страницу (или
        достучаться до API) имеют полный контроль над системой. Не порядок!
    accessEnabled:
      header: Зона Риска&trade;
      warning: >-
        <b class="text-danger">Внимание:</b> Отключение контроля доступа предоставит полный доступ к Системе {appName}
        любому, кто может зайти на эту страницу или достучаться до API. Мы предупреждали!
      buttonText:
        disable: Вы хорошо подумали? Если да - нажмите еше раз.
        prompt: Отключить контроль доступа
    accessDisabled:
      header: 1. Создайте администратора
      helpText: 'Этот пользователь будет адимном с полным доступом к Сисиеме {appName}.'
      form:
        login:
          labelText: Имя пользователя
          placeholder: e.g. ivan_god
        name:
          labelText: Полное имя
          placeholder: напр. Ivan Ivanov
        password:
          labelText: Пароль
        confirmPassword:
          labelText: Повторите пароль
    accessControl:
      header: 2. Включите контроль доступа
      helpText: 'Нажмите, чтобы включить контроль доступа и войти в систему.'
      buttonText:
        pre: Включить встроенную аунтификацию
        post: Включаю...
