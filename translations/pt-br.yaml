helpPage:
  header: Links úteis & Informações
  banner: Avisos
  releaseText: 'Lançado:'
  environment:
    header: O que é um ambiente?
    content: >
      <p>{appName} uporta o agrupamento de recursos em vários ambientes. Cada um recebe seu próprio conjunto de recursos
      de infra-estrutura e serviços, e é possuído por um ou mais usuários GitHub, equipes ou organizações.</p>

      <p>Por exemplo, você pode criar separado ambientes "dev", "test", e "production" para manter as coisas isoladas
      umas das outras e dar "dev" acesso a toda a organização, mas restringir o ambiente "production" para uma equipe
      menor.</p>
    manageLink: Gerenciar Ambientes
  host:
    header: O que é um host?
    content: >
      Antes de adicionar o primeiro serviço ou iniciar um contêiner, adicione pelo menos um host Linux que execute uma versão compatível do Docker. O host deve conseguir acessar o servidor {appName} por HTTP. O {appName} oferece suporte a hosts Linux virtuais e físicos em nuvens públicas, nuvens privadas e ambientes bare metal.
    contentLink: Saiba Mais
    addHostLink: Adicionar Host
  stacks:
    header: O que são stacks e serviços?
    content:
      paragraph1: >
        Um serviço é simplesmente um grupo de contêineres, criado a partir da mesma imagem Docker, mas estende Docker
        "link" conceito para alavancar {appName}'s serviço DNS distribuído leve para descoberta de serviço. Serviços
        podem ser adicionados individualmente ou por meio da implantação de um item do catálogo.
      paragraph2: >-
        Um serviço também é capaz de alavancar outros {appName} serviços internos como balanceadores de carga,
        monitoramento de integridade, suporte de atualização e alta disponibilidade.
      link: Saiba Mais
    addServiceLink: Gerenciar serviços
    addCatalogLink: Adicionar do Catálogo
    noHosts: 'Você não tem atualmente nenhum host. Por favor, adicione um host antes de adicionar serviços.'
    manageServiceLink: Gerenciar Serviços
  issues:
    header:
      text: Problemas e documentação
      tagline: Encontrou um problema?
      fileBug: Relatar um problema
    content:
      paragraph1: >
        O {appName} é uma plataforma de software de código aberto que oferece uma infraestrutura criada especificamente
        para executar contêineres em produção. O uso crescente de contêineres Docker como cargas de trabalho de
        aplicações traz novas exigências para serviços de infraestrutura, como rede, armazenamento, balanceamento de
        carga, segurança, descoberta de serviços e gerenciamento de recursos.
      graphic1:
        text: Encontrar um bug?
        link: Relatar o problema no GitHub
      graphic2:
        text: Para obter mais informações
        link: Documentação
      graphic3:
        text: Precisa de ajuda para solução de problemas?
        link: Veja aqui as nossas FAQs
  commercial:
    header: Suporte Comercial
    content: |
      PastureStack é mantido pela comunidade e não tem a pretensão de fornecer suporte comercial.
