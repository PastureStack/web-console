        Inicie uma máquina Windows Server 2016, instale <a href="https://docs.docker.com/engine/install/"
        target="_blank" rel="noopener noreferrer">Docker</a>e revise o <a
        href="{docsBase}/hosts/#supported-docker-versions" target="_blank" rel="noopener noreferrer">orientação de
        compatibilidade de host</a> antes do registro.
      step2: 'Verifique e instale os recursos RemoteAccess e roteamento em Windows:'
      step2Copy: 'Get-WindowsFeature -Name "RemoteAccess","Routing" | Install-WindowsFeature'
      step2Note: 'Nota: a máquina Windows precisará ser reinicializada se os aplicativos estiverem instalados.'
      step3: >-
        Especifique uma sub-rede exclusiva para o host Windows. Para oferecer suporte a uma rede de sobreposição em
        Windows, cada host no ambiente deve ter uma sub-rede exclusiva.
      step4: >-
        Especifique o roteador IP para a sub-rede do host. Este IP é usado para encaminhar o tráfego de rede entre os
        diferentes hosts.
